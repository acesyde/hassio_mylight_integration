export_measures_csv:
  name: Export measures as CSV
  description: >
    Exports daily energy measures for a date range to a CSV file in
    /config/www/mylight_systems/ and returns the download URL path in the
    service response (key: path, e.g. /local/mylight_systems/mylight_export_2025-01-01_2025-01-31.csv).
  fields:
    from_date:
      name: From date
      description: Start date in YYYY-MM-DD format (inclusive).
      required: true
      example: "2025-01-01"
      selector:
        text:
    to_date:
      name: To date
      description: End date in YYYY-MM-DD format (inclusive, must be today or earlier).
      required: true
      example: "2025-01-31"
      selector:
        text:
